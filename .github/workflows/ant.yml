name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Locate Gradle project root
        id: locate
        run: |
          if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          else
            FOUND=$(find . -maxdepth 4 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print -quit)
            if [ -z "$FOUND" ]; then
              echo "::error::Could not find settings.gradle anywhere in the repository. Check that all project files (build.gradle, settings.gradle, app/, gradle/...) were uploaded."
              exit 1
            fi
            DIR=$(dirname "$FOUND")
            echo "Found Gradle project at: $DIR"
            echo "project_dir=$DIR" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/app-debug.apk
